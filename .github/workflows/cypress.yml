name: Cypress Test Suite

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tags:
        description: 'Filter tests by tag (e.g. @smoke, @forms, @homePage). Leave empty to run all tests.'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  cypress-run:
    name: Run Cypress Tests
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all tests (no tag filter)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.tags == '') }}
        run: npx cypress run

      - name: Run tests filtered by tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tags != '' }}
        run: npx cypress run --env grepTags=${{ inputs.tags }}

      - name: Generate reports index page
        if: always()
        run: |
          echo "<html><head><title>Cypress Reports</title><style>body{font-family:sans-serif;padding:2rem;}a{display:block;margin:.5rem 0;}</style></head><body>" > cypress/reports/index.html
          echo "<h1>Cypress Test Reports</h1><ul>" >> cypress/reports/index.html
          for f in cypress/reports/*.html; do
            name=$(basename "$f")
            if [ "$name" != "index.html" ]; then
              echo "<li><a href=\"$name\">$name</a></li>" >> cypress/reports/index.html
            fi
          done
          echo "</ul></body></html>" >> cypress/reports/index.html

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: cypress/reports/
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: cypress/reports/

      - name: Deploy to GitHub Pages
        if: always()
        id: deploy-pages
        uses: actions/deploy-pages@v4
